global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'go-api'
    static_configs:
      - targets: ['go-api:9091']

  - job_name: 'clickhouse-consumer'
    static_configs:
      - targets: ['clickhouse-consumer:9094']

  - job_name: 'python-agent'
    static_configs:
      - targets: ['python-agent:9093']
