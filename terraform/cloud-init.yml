#cloud-config

package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose-v2
  - git
  - curl
  - ufw
  - fail2ban

runcmd:
  # Enable and start Docker.
  - systemctl enable docker
  - systemctl start docker

  # Allow docker commands without sudo.
  - usermod -aG docker root

  # Basic hardening.
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # 4 GB swap so on-server image builds (the Vite/Node frontend especially) don't
  # OOM on the 8 GB Droplet, and the running stack has headroom under load.
  - fallocate -l 4G /swapfile
  - chmod 600 /swapfile
  - mkswap /swapfile
  - swapon /swapfile
  - sh -c 'echo "/swapfile none swap sw 0 0" >> /etc/fstab'
  - sysctl -w vm.swappiness=10

  # Create app directory.
  - mkdir -p /opt/shortener

  # Signal that cloud-init is done.
  - touch /var/log/cloud-init-done
