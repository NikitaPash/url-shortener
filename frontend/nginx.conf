server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # Vite fingerprints asset filenames — cache them forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # All other paths → index.html so React Router handles client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
