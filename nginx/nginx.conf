worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Throttle the AI agent endpoint: it routes straight to python-agent (bypassing
    # the Go API's rate limiter) and each request costs a Gemini call. Per client IP.
    limit_req_zone $binary_remote_addr zone=ai_query:10m rate=20r/m;
    limit_req_status 429;

    upstream go_api {
        server go-api:8080;
    }

    upstream python_agent {
        server python-agent:8090;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream jaeger {
        server jaeger:16686;
    }

    upstream frontend {
        server frontend:80;
    }

    upstream prometheus {
        server prometheus:9090;
    }

    server {
        listen 80;
        server_name _;  # Catch-all: handles default domain AND custom domains.

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Health check for Nginx itself.
        location = /nginx-health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Frontend SPA — trailing slash strips /app/ prefix before proxying,
        # so the inner nginx receives paths without the /app prefix.
        location /app/ {
            proxy_pass         http://frontend/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Prometheus UI.
        location /prometheus/ {
            proxy_pass         http://prometheus/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # AI agent — must be matched before the catch-all.
        location /api/query {
            # Allow a small burst (e.g. clicking a few example questions), then
            # smooth to the zone rate; excess returns 429 instead of queueing.
            limit_req zone=ai_query burst=10 nodelay;

            proxy_pass http://python_agent;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Grafana UI — no trailing slash so /grafana/ prefix is preserved.
        location /grafana/ {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # WebSocket support for Grafana Live.
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Jaeger UI — no trailing slash so the /jaeger/ prefix is preserved
        # (Jaeger runs with --query.base-path=/jaeger and serves assets there).
        location /jaeger/ {
            proxy_pass http://jaeger;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Everything else → Go API (auth, shorten, redirects).
        # This MUST be last — matches everything.
        location / {
            proxy_pass http://go_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 5s;
        }
    }
}
