worker_processes auto;

events {
    worker_connections 1024;
}

# Production nginx: terminates TLS on :443 and redirects :80 → :443. Mirrors the
# routing/rate-limiting of nginx.conf (used for local HTTP). Selected at deploy
# time via NGINX_CONF=./nginx/nginx.prod.conf together with docker-compose.prod.yml.
http {
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Throttle the AI agent endpoint: it routes straight to python-agent (bypassing
    # the Go API's rate limiter) and each request costs a Gemini call. Per client IP.
    limit_req_zone $binary_remote_addr zone=ai_query:10m rate=20r/m;
    limit_req_status 429;

    upstream go_api {
        server go-api:8080;
    }

    upstream python_agent {
        server python-agent:8090;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream jaeger {
        server jaeger:16686;
    }

    upstream frontend {
        server frontend:80;
    }

    upstream prometheus {
        server prometheus:9090;
    }

    # ── Port 80: ACME challenge + redirect everything else to HTTPS ──────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt http-01 challenge, served from the shared certbot webroot.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Keep nginx's own health check on plain HTTP so the container healthcheck
        # and the cert-bootstrap script never depend on a valid certificate.
        location = /nginx-health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Port 443: TLS termination + the real reverse proxy ───────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;  # Catch-all: handles default domain AND custom domains.

        # Issued with `certbot --cert-name shortener` (see init-letsencrypt.sh), so
        # the path is fixed regardless of which DOMAIN is configured.
        ssl_certificate     /etc/letsencrypt/live/shortener/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/shortener/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location = /nginx-health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Frontend SPA — trailing slash strips /app/ prefix before proxying,
        # so the inner nginx receives paths without the /app prefix.
        location /app/ {
            proxy_pass         http://frontend/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Prometheus UI.
        location /prometheus/ {
            proxy_pass         http://prometheus/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # AI agent — must be matched before the catch-all.
        location /api/query {
            # Allow a small burst (e.g. clicking a few example questions), then
            # smooth to the zone rate; excess returns 429 instead of queueing.
            limit_req zone=ai_query burst=10 nodelay;

            proxy_pass http://python_agent;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # Grafana UI — no trailing slash so /grafana/ prefix is preserved.
        location /grafana/ {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket support for Grafana Live.
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Jaeger UI — no trailing slash so the /jaeger/ prefix is preserved
        # (Jaeger runs with --query.base-path=/jaeger and serves assets there).
        location /jaeger/ {
            proxy_pass http://jaeger;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else → Go API (auth, shorten, redirects).
        # This MUST be last — matches everything.
        location / {
            proxy_pass http://go_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 5s;
        }
    }
}
