name: Code Check

# Quality gate: lint + test every component. Runs on PRs and on pushes to the
# main branches. The CI/CD (deploy) workflow only runs after this succeeds on main.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: code-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-api:
    name: Go API — vet, test, lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: shortener_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/shortener/go.sum
      - name: vet + test (race)
        working-directory: backend/shortener
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/shortener_test?sslmode=disable
          REDIS_ADDR: localhost:6379
          JWT_SECRET: test-secret
          KAFKA_BROKERS: ""
          GEOIP_DB_PATH: ""
        run: |
          go vet ./...
          go test ./... -count=1 -race -timeout=120s
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: backend/shortener
          args: --timeout=5m

  consumer:
    name: ClickHouse consumer — vet, test, lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: clickhouse-consumer/go.sum
      - name: vet + test (race)
        working-directory: clickhouse-consumer
        run: |
          go vet ./...
          go test ./... -count=1 -race -timeout=120s
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: clickhouse-consumer
          args: --timeout=5m

  python-agent:
    name: Python agent — pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.30"
          enable-cache: true
          cache-dependency-glob: "python-agent/uv.lock"
      - name: Install dependencies
        working-directory: python-agent
        run: uv sync --frozen
      - name: pytest
        working-directory: python-agent
        env:
          CLICKHOUSE_HOST: ""
          GEMINI_API_KEY: ""
          JWT_SECRET: test-secret
        run: uv run --frozen pytest tests/ -v --tb=short

  frontend:
    name: Frontend — vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Unit / component tests
        working-directory: frontend
        run: npm test
