apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse
    access: proxy
    isDefault: true
    jsonData:
      host: clickhouse
      port: 8123
      protocol: http
      defaultDatabase: shortener
      username: default
    secureJsonData:
      # Interpolated from the grafana container's env (set in docker-compose).
      # Empty CLICKHOUSE_PASSWORD → empty password, so local dev still works.
      password: ${CLICKHOUSE_PASSWORD}
    editable: true
